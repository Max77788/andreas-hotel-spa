<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Option B — Andreas Hotel & Spa</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #1a1a1a; color: #e8ddd0; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 60px 20px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 300; text-align: center; color: #e8ddd0; }
    .desc { text-align: center; font-size: 12px; color: rgba(232,221,208,0.5); margin: 8px 0 50px; }
    .preview { padding: 40px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
    .preview-dark { background: #2a2118; }
    .preview-light { background: #f5f0e8; }
    .label { font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase; color: #c9a96e; margin-bottom: 12px; }
    img { max-height: 70px; width: auto; }
    .note { font-size: 11px; color: rgba(232,221,208,0.4); text-align: center; margin-top: 40px; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Logo Option B</h1>
    <p class="desc">"Andreas" / Hotel &amp; Spa (current style)</p>

    <div class="preview preview-dark">
      <p class="label">Dark Background</p>
      <img src="/logo-andreas-white.png" alt="Andreas Hotel & Spa">
    </div>
    <div class="preview preview-light">
      <p class="label" style="color:#b8743d">Light Background</p>
      <img src="/logo-andreas.png" alt="Andreas Hotel & Spa">
    </div>

    <p class="note">Option B drops the definite article — cleaner, bolder feel</p>
  </div>
</body>
</html>
