<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Option A - The Andreas Hotel &amp; Spa</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #1a1a1a; color: #e8ddd0; }
    .container { max-width: 900px; margin: 0 auto; padding: 60px 20px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 300; text-align: center; margin-bottom: 8px; color: #e8ddd0; }
    .tagline { text-align: center; font-size: 11px; letter-spacing: 0.4em; text-transform: uppercase; color: #c9a96e; margin-bottom: 50px; }
    .variant { margin-bottom: 60px; }
    .variant h2 { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; color: #c9a96e; margin-bottom: 20px; padding-bottom: 8px; border-bottom: 1px solid rgba(201,169,110,0.3); }
    .logo-dark, .logo-light { display: flex; align-items: center; gap: 30px; padding: 30px; border-radius: 8px; margin-bottom: 15px; }
    .logo-dark { background: #2a2118; }
    .logo-light { background: #f5f0e8; }
    .logo-preview { max-height: 60px; width: auto; }
    .label { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #c9a96e; margin-bottom: 4px; }
    .nav-preview { display: flex; align-items: center; gap: 20px; padding: 16px 24px; border-radius: 6px; margin-bottom: 15px; }
    .nav-dark { background: #2a2118; }
    .nav-light { background: #f5f0e8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Logo Option A</h1>
    <p class="tagline">The Andreas Hotel &amp; Spa</p>
    
    <div class="variant">
      <h2>Current Logo (unchanged)</h2>
      <div class="logo-dark">
        <div>
          <p class="label">Dark background</p>
          <img src="/andreas_logo_white.png" alt="The Andreas Hotel & Spa" class="logo-preview" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <p style="display:none;font-family:'Cormorant Garamond',serif;font-size:24px;color:#e8ddd0;letter-spacing:0.05em">The Andreas Hotel &amp; Spa</p>
        </div>
      </div>
      <div class="logo-light">
        <div>
          <p class="label" style="color:#b8743d">Light background</p>
          <img src="/andreas_logo.png" alt="The Andreas Hotel & Spa" class="logo-preview" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <p style="display:none;font-family:'Cormorant Garamond',serif;font-size:24px;color:#2a2118;letter-spacing:0.05em">The Andreas Hotel &amp; Spa</p>
        </div>
      </div>
      <p style="font-size:12px;color:rgba(232,221,208,0.5)">Current logo: "The Andreas Hotel &amp; Spa"</p>
    </div>
  </div>
</body>
</html>
